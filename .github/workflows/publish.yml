name: Test and publish

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test and build
        run: npm run check:all

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check whether this version is already published
        if: github.ref == 'refs/heads/main'
        id: npm-version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "intent-link@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "intent-link@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "intent-link@${PACKAGE_VERSION} is new and will be published."
          fi

      - name: Publish package
        if: github.ref == 'refs/heads/main' && steps.npm-version.outputs.publish == 'true'
        run: npm publish
